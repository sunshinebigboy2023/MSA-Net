# Production overrides for the multimodal sentiment analysis backend.
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:yupi}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true
    username: ${MYSQL_USERNAME:msa_user}
    password: ${MYSQL_PASSWORD:}
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1500000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
  session:
    timeout: 86400
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 5000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:}
  servlet:
    multipart:
      max-file-size: ${MSA_UPLOAD_MAX_VIDEO_SIZE_MB:200}MB
      max-request-size: ${MSA_UPLOAD_MAX_VIDEO_SIZE_MB:200}MB
server:
  address: 0.0.0.0
msa:
  base-url: ${MSA_BASE_URL:http://127.0.0.1:8000}
  async-enabled: ${MSA_ASYNC_ENABLED:true}
  upload-dir: ${MSA_UPLOAD_DIR:runtime/uploads}
  max-video-size-mb: ${MSA_UPLOAD_MAX_VIDEO_SIZE_MB:200}
  callback-token: ${MSA_CALLBACK_TOKEN:}
  submit-limit: ${MSA_SUBMIT_LIMIT:20}
  submit-window-seconds: ${MSA_SUBMIT_WINDOW_SECONDS:60}
  max-retry-count: ${MSA_MAX_RETRY_COUNT:3}
  stale-task-seconds: ${MSA_STALE_TASK_SECONDS:300}
  retry-delay-ms: ${MSA_RETRY_DELAY_MS:30000}
