services:
  mysql:
    image: mysql:8.0
    container_name: msa-net-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yupi}
      MYSQL_USER: ${MYSQL_USERNAME:-msa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./Net/user-center-backend-master/sql/create_table.sql:/docker-entrypoint-initdb.d/01-create-table.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: msa-net-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: msa-net-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: msa-net-backend:latest
    build:
      context: ./Net/user-center-backend-master
    container_name: msa-net-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yupi}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-msa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT: 3000
      SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1500000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      MSA_ASYNC_ENABLED: "true"
      MSA_UPLOAD_DIR: /app/runtime/uploads
      MSA_UPLOAD_MAX_VIDEO_SIZE_MB: ${MSA_UPLOAD_MAX_VIDEO_SIZE_MB:-200}
      MSA_CALLBACK_TOKEN: ${MSA_CALLBACK_TOKEN}
      MSA_SUBMIT_LIMIT: 5000
      MSA_SUBMIT_WINDOW_SECONDS: 60
    volumes:
      - upload-data:/app/runtime/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  msa-worker:
    image: msa-net-worker:latest
    build:
      context: ./MSA
      dockerfile: Dockerfile.worker
    container_name: msa-net-worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      MSA_ANALYSIS_QUEUE: msa.analysis.queue
      MSA_CALLBACK_BASE_URL: ${MSA_CALLBACK_BASE_URL:-http://backend:8080/api}
      MSA_CALLBACK_TOKEN: ${MSA_CALLBACK_TOKEN}
      MSA_WORKER_CONCURRENCY: ${MSA_WORKER_CONCURRENCY:-2}
      MSA_CHECKPOINT: /app/models
    volumes:
      - upload-data:/app/runtime/uploads
      - ./MSA/dataset:/app/dataset:ro
      - ./MSA/models:/app/models:ro
      - ./MSA/tools:/app/tools:ro
      - ./MSA/saved:/app/saved
    depends_on:
      backend:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  frontend:
    image: msa-net-frontend:latest
    build:
      context: ./Net/user-center-frontend-master
    container_name: msa-net-frontend
    ports:
      - "5020:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  upload-data:
